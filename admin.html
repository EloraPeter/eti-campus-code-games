<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETI Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
    <div class="max-w-7xl mx-auto p-8">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-4xl font-bold heading-font">ETI Campus Code Games</h1>
                <p class="text-white/60">Admin Dashboard</p>
            </div>
            <div class="flex gap-4">
                <button onclick="exportToCSV()" 
                        class="bg-emerald-600 hover:bg-emerald-700 px-6 py-3 rounded-2xl font-medium flex items-center gap-2">
                    <i class="fas fa-download"></i> Export CSV
                </button>
                <button onclick="loadRegistrations()" 
                        class="bg-cyan-500 hover:bg-cyan-600 px-6 py-3 rounded-2xl font-medium flex items-center gap-2">
                    <i class="fas fa-refresh"></i> Refresh
                </button>
            </div>
        </div>

        <div class="bg-zinc-900 rounded-3xl p-8">
            <div class="flex justify-between mb-6">
                <h2 class="text-2xl">All Registrations (<span id="count">0</span>)</h2>
                <span id="lastUpdated" class="text-xs text-white/50"></span>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="border-b border-white/20 text-white/60 text-left">
                            <th class="pb-4">Name</th>
                            <th class="pb-4">University</th>
                            <th class="pb-4">Category</th>
                            <th class="pb-4">Email</th>
                            <th class="pb-4">Phone</th>
                            <th class="pb-4">Reg ID</th>
                            <th class="pb-4">Status</th>
                            <th class="pb-4">Date</th>
                        </tr>
                    </thead>
                    <tbody id="registrationsTable" class="text-sm"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Poor coding practice. You don't hardcode credentials
        const ADMIN_PASSWORD = "eti2026";   // Change this to something stronger later

        async function loadRegistrations() {
            const password = prompt("Enter Admin Password:");
            if (password !== ADMIN_PASSWORD) {
                alert("Incorrect password");
                return;
            }

            try {
                document.getElementById('registrationsTable').innerHTML = `
                    <tr><td colspan="8" class="py-12 text-center text-white/50">Loading registrations...</td></tr>
                `;

                const res = await fetch('http://localhost:5000/api/admin/registrations');
                const data = await res.json();

                const tbody = document.getElementById('registrationsTable');
                tbody.innerHTML = '';

                document.getElementById('count').textContent = data.length;

                if (data.length === 0) {
                    tbody.innerHTML = `
                        <tr><td colspan="8" class="py-12 text-center text-white/50">No registrations yet.<br>Make a test payment to see data here.</td></tr>
                    `;
                    return;
                }

                data.forEach(reg => {
                    const row = document.createElement('tr');
                    row.className = "border-b border-white/10 hover:bg-white/5";
                    row.innerHTML = `
                        <td class="py-4 font-medium">${reg.full_name}</td>
                        <td class="py-4">${reg.university}</td>
                        <td class="py-4">${reg.category}</td>
                        <td class="py-4 text-sm break-all">${reg.email}</td>
                        <td class="py-4">${reg.phone || '-'}</td>
                        <td class="py-4 font-mono text-cyan-400">${reg.registration_id || '-'}</td>
                        <td class="py-4">
                            <span class="px-3 py-1 rounded-full text-xs font-medium ${reg.payment_status === 'paid' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}">
                                ${reg.payment_status.toUpperCase()}
                            </span>
                        </td>
                        <td class="py-4 text-xs text-white/60">${new Date(reg.created_at).toLocaleString()}</td>
                    `;
                    tbody.appendChild(row);
                });

                document.getElementById('lastUpdated').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
            } catch (err) {
                console.error(err);
                document.getElementById('registrationsTable').innerHTML = `
                    <tr><td colspan="8" class="py-12 text-center text-red-400">Error loading data. Backend may not be running.</td></tr>
                `;
            }
        }

        function exportToCSV() {
            const password = prompt("Enter Admin Password to export:");
            if (password !== ADMIN_PASSWORD) {
                alert("Incorrect password");
                return;
            }

            fetch('http://localhost:5000/api/admin/registrations')
                .then(res => res.json())
                .then(data => {
                    let csv = "Name,University,Category,Email,Phone,Reg ID,Status,Date\n";
                    data.forEach(row => {
                        csv += `"${row.full_name}","${row.university}","${row.category}","${row.email}","${row.phone || ''}","${row.registration_id || ''}","${row.payment_status}",${row.created_at}\n`;
                    });

                    const blob = new Blob([csv], { type: 'text/csv' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `eti_registrations_${new Date().toISOString().slice(0,10)}.csv`;
                    a.click();
                });
        }

        // Auto load when page opens
        window.onload = loadRegistrations;
    </script>
</body>
</html>
